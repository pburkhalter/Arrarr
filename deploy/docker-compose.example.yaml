services:
  arrarr:
    image: ghcr.io/pburkhalter/arrarr:latest
    container_name: arrarr
    restart: unless-stopped
    ports:
      - "8086:8080"
    environment:
      ARRARR_API_KEY: ${ARRARR_API_KEY}
      TORBOX_API_KEY: ${TORBOX_API_KEY}
      ARRARR_URL_BASE: /sabnzbd
      ARRARR_DOWNLOAD_DIR: /downloads
      ARRARR_DOWNLOAD_CONCURRENCY: "4"
      # qBittorrent shim — Sonarr/Radarr can target arrarr as a qBit endpoint
      # too. Leave password unset to disable the shim.
      ARRARR_QBIT_USERNAME: admin
      ARRARR_QBIT_PASSWORD: ${ARRARR_QBIT_PASSWORD}
      DB_PATH: /data/arrarr.db
      LOG_LEVEL: info
      LOG_FORMAT: json
      # Outbound events (optional): POST every job state transition to a
      # tracker (Journarr) so it can mirror the TorBox substages. Empty URL
      # disables it. Fire-and-forget — never affects the state machine.
      # ARRARR_EVENTS_URL: http://192.168.0.203:8484/webhook/arrarr
      # ARRARR_EVENTS_TOKEN: ${JOURNARR_WEBHOOK_TOKEN}
    volumes:
      - /opt/docker-data/arrarr:/data
      - /mnt/downloads:/downloads
    extra_hosts:
      - "host.docker.internal:host-gateway"
